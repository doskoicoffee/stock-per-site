<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>株式ダッシュボード</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 8px;
    }
    .subtitle {
      color: #555;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .card {
      background: white;
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.06);
      text-decoration: none;
      color: #222;
      border: 1px solid #eef1f5;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }
    .card h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }
    .card p {
      margin: 0;
      color: #555;
      font-size: 13px;
      line-height: 1.5;
    }
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>株式ダッシュボード</h1>
    <div class="subtitle">各ページへのリンク</div>

    <div class="grid">
      <a class="card" href="stocks.html">
        <h2>銘柄の一覧（週一更新）</h2>
        <p>一覧表示とスクリーニング。週次更新。</p>
      </a>
      <a class="card" href="market.html">
        <h2>市況（生成AI / 日次更新）</h2>
        <p>主要指数・為替・原油・ニュースなど。</p>
      </a>
      <a class="card" href="sector.html">
        <h2>業界別動向（週一更新）</h2>
        <p>33業種ヒートマップと銘柄詳細。</p>
      </a>
    </div>
  </div>
</body>
</html>
