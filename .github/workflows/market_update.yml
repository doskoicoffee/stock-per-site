name: Daily Market Update

permissions:
  contents: write

on:
  schedule:
    - cron: '0 9 * * *'  # 毎日18:00 JST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pythonセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: |
          python -m pip install --upgrade pip
          pip install "pandas<3"
          pip install -r requirements.txt --upgrade --force-reinstall

      - name: 市況データ更新
        env:
          METALPRICEAPI_KEY: ${{ secrets.METALPRICEAPI_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
        run: |
          python generate_market.py

      - name: 自動コミット
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add market_data/market.json market_data/series
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "日次市況更新"
          git fetch origin main
          git rebase origin/main
          git push



