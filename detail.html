<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>&#x9298;&#x67C4;&#x8A73;&#x7D30;</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 20px;
      color: #1f2937;
    }

    .container {
      max-width: 1080px;
      margin: auto;
    }

    .page-nav {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-block;
      color: #2d7ff9;
      text-decoration: none;
      font-weight: 600;
    }

    .switcher {
      display: flex;
      gap: 10px;
      margin: 10px 0 16px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      background: #2d7ff9;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn.secondary {
      background: #0f766e;
    }

    .btn.ghost {
      background: #e5e7eb;
      color: #111827;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 18px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.06);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .kpi-item {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fafafa;
      min-height: 64px;
    }

    .kpi-label {
      color: #6b7280;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      color: #111827;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .kpi-sub {
      margin-top: 10px;
      font-size: 13px;
      color: #374151;
    }

    .chart-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .overlay-summary {
      font-size: 13px;
      color: #374151;
    }

    .overlay-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay-modal.open {
      display: flex;
    }

    .overlay-panel {
      width: min(560px, 96vw);
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      padding: 16px;
    }

    .overlay-panel h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .overlay-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .overlay-option {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      padding: 6px 8px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fafafa;
    }

    .overlay-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .chart-wrap {
      min-height: 320px;
    }

    @media (max-width: 900px) {
      .kpi-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .overlay-options {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-nav">
      <a class="back-link" href="index.html">&#x2190; &#x30C8;&#x30C3;&#x30D7;&#x3078;</a>
      <a class="back-link" href="#" onclick="goBack(event)">&#x2190; &#x524D;&#x306B;&#x623B;&#x308B;</a>
    </div>

    <h1 id="stock-name"></h1>

    <div class="switcher">
      <button class="btn" onclick="moveStock(-1)">&#x2190; &#x524D;&#x3078;</button>
      <button class="btn" onclick="moveStock(1)">&#x6B21;&#x3078; &#x2192;</button>
    </div>

    <div class="card">
      <h2>&#x4E3B;&#x8981;&#x6307;&#x6A19;</h2>
      <div id="kpi-grid" class="kpi-grid"></div>
      <div id="kpi-sub" class="kpi-sub"></div>
    </div>

    <div class="card">
      <h2>&#x682A;&#x4FA1;&#x30C1;&#x30E3;&#x30FC;&#x30C8;</h2>
      <div class="chart-toolbar">
        <button class="btn secondary" type="button" onclick="openOverlayWindow()">&#x91CD;&#x7573;&#x6307;&#x6A19;&#x3092;&#x9078;&#x629E;</button>
        <div id="overlay-summary" class="overlay-summary">&#x91CD;&#x7573;: &#x306A;&#x3057;</div>
      </div>
      <div class="chart-wrap">
        <canvas id="priceChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>&#x58F2;&#x4E0A;&#x9AD8;</h2>
      <div class="chart-wrap">
        <canvas id="financeChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>&#x5229;&#x76CA;</h2>
      <div class="chart-wrap">
        <canvas id="profitChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>&#x914d;&#x5F53;&#x30B0;&#x30E9;&#x30D5;&#xFF08;&#x5E74;&#x6B21;&#xFF09;</h2>
      <div class="chart-wrap">
        <canvas id="dividendChart"></canvas>
      </div>
    </div>
  </div>

  <div id="overlay-modal" class="overlay-modal" onclick="handleOverlayBackdrop(event)">
    <div class="overlay-panel">
      <h3>&#x91CD;&#x7573;&#x3059;&#x308B;&#x6307;&#x6A19;&#x3092;&#x30C1;&#x30A7;&#x30C3;&#x30AF;</h3>
      <div id="overlay-options" class="overlay-options"></div>
      <div class="overlay-actions">
        <button class="btn ghost" type="button" onclick="closeOverlayWindow()">&#x30AD;&#x30E3;&#x30F3;&#x30BB;&#x30EB;</button>
        <button class="btn" type="button" onclick="applyOverlaySelection()">&#x9069;&#x7528;</button>
      </div>
    </div>
  </div>

  <script>
let allStocks = [];
let currentIndex = 0;
let currentStock = null;
let currentRows = [];
let priceChart = null;
let financeChart = null;
let profitChart = null;
let dividendChart = null;
const historyCache = new Map();

const overlayDefs = [
  { key: "per", label: "PER", unit: "\u500d", color: "#8b5cf6", getter: s => s?.valuation?.per },
  { key: "pbr", label: "PBR", unit: "\u500d", color: "#7c3aed", getter: s => s?.valuation?.pbr },
  { key: "roe", label: "ROE", unit: "%", color: "#ef4444", getter: s => s?.profitability?.roe },
  { key: "roa", label: "ROA", unit: "%", color: "#f97316", getter: s => s?.profitability?.roa },
  { key: "div_yield", label: "\u914d\u5f53\u5229\u56de\u308a", unit: "%", color: "#0ea5e9", getter: s => s?.dividend?.yield },
  { key: "op_margin", label: "\u55b6\u696d\u5229\u76ca\u7387", unit: "%", color: "#10b981", getter: s => s?.profitability?.operating_margin },
  { key: "net_margin", label: "\u7d14\u5229\u76ca\u7387", unit: "%", color: "#14b8a6", getter: s => s?.profitability?.net_margin },
  { key: "equity_ratio", label: "\u81ea\u5df1\u8cc7\u672c\u6bd4\u7387", unit: "%", color: "#22c55e", getter: s => s?.financial?.equity_ratio }
];

let selectedOverlayKeys = [];

function toNumber(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : null;
}

function formatNumber(value, digits = 1) {
  const n = toNumber(value);
  if (n == null) return "-";
  return n.toLocaleString("ja-JP", {
    minimumFractionDigits: 0,
    maximumFractionDigits: digits
  });
}

function formatPercent(value, digits = 1) {
  const n = toNumber(value);
  if (n == null) return "-";
  return `${formatNumber(n, digits)}%`;
}

function splitCsvLine(line) {
  const out = [];
  let cur = "";
  let inQuote = false;
  for (let i = 0; i < line.length; i += 1) {
    const ch = line[i];
    if (ch === '"') {
      const next = line[i + 1];
      if (inQuote && next === '"') {
        cur += '"';
        i += 1;
      } else {
        inQuote = !inQuote;
      }
      continue;
    }
    if (ch === "," && !inQuote) {
      out.push(cur);
      cur = "";
      continue;
    }
    cur += ch;
  }
  out.push(cur);
  return out;
}

function parsePriceCsv(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length <= 1) return [];

  const headers = splitCsvLine(lines[0]).map(h => h.trim().toLowerCase());
  const dateIdx = headers.indexOf("date");
  let closeIdx = headers.indexOf("close");
  if (closeIdx < 0) closeIdx = headers.indexOf("adj close");

  const fallbackSimple = dateIdx < 0 || closeIdx < 0;
  const out = [];

  for (let i = 1; i < lines.length; i += 1) {
    const cols = splitCsvLine(lines[i]);
    if (fallbackSimple) {
      if (cols.length < 2) continue;
      const dateRaw = (cols[0] || "").trim();
      const close = Number(cols[1]);
      if (!dateRaw || !Number.isFinite(close)) continue;
      out.push({ date: dateRaw.slice(0, 10), close });
      continue;
    }

    const dateRaw = (cols[dateIdx] || "").trim();
    const close = Number(cols[closeIdx]);
    if (!dateRaw || !Number.isFinite(close)) continue;
    out.push({ date: dateRaw.slice(0, 10), close });
  }

  return out;
}

async function loadPriceHistory(code) {
  const key = String(code || "").trim();
  if (!key) return [];
  if (historyCache.has(key)) return historyCache.get(key);

  const path = `sector_data/series/${encodeURIComponent(key)}.csv?v=${Date.now()}`;
  try {
    const res = await fetch(path);
    if (!res.ok) throw new Error("history fetch failed");
    const text = await res.text();
    const rows = parsePriceCsv(text);
    historyCache.set(key, rows);
    return rows;
  } catch (e) {
    historyCache.set(key, []);
    return [];
  }
}

function movingAverage(values, span) {
  const out = new Array(values.length).fill(null);
  if (!Array.isArray(values) || values.length === 0 || span <= 0) return out;

  let sum = 0;
  for (let i = 0; i < values.length; i += 1) {
    sum += values[i];
    if (i >= span) sum -= values[i - span];
    if (i >= span - 1) out[i] = sum / span;
  }
  return out;
}

function calcReturnPct(rows, backDays) {
  if (!rows || rows.length <= backDays) return null;
  const latest = toNumber(rows[rows.length - 1]?.close);
  const base = toNumber(rows[rows.length - 1 - backDays]?.close);
  if (latest == null || base == null || base === 0) return null;
  return ((latest / base) - 1) * 100;
}

function renderKpiGrid(stock, rows) {
  const kpis = [
    { label: "\u73FE\u5728\u5024", value: `${formatNumber(stock?.price?.current, 1)} \u5186` },
    { label: "PER", value: formatNumber(stock?.valuation?.per, 1) },
    { label: "PBR", value: formatNumber(stock?.valuation?.pbr, 1) },
    { label: "ROE", value: formatPercent(stock?.profitability?.roe, 1) },
    { label: "\u914d\u5F53\u5229\u56DE\u308A", value: formatPercent(stock?.dividend?.yield, 1) },
    { label: "\u55B6\u696D\u5229\u76CA\u7387", value: formatPercent(stock?.profitability?.operating_margin, 1) },
    { label: "\u7D14\u5229\u76CA\u7387", value: formatPercent(stock?.profitability?.net_margin, 1) },
    { label: "\u81EA\u5DF1\u8CC7\u672C\u6BD4\u7387", value: formatPercent(stock?.financial?.equity_ratio, 1) }
  ];

  const grid = document.getElementById("kpi-grid");
  grid.innerHTML = kpis.map(item => `
    <div class="kpi-item">
      <div class="kpi-label">${item.label}</div>
      <div class="kpi-value">${item.value}</div>
    </div>
  `).join("");

  const r1w = calcReturnPct(rows, 5);
  const r1m = calcReturnPct(rows, 21);
  const r3m = calcReturnPct(rows, 63);
  document.getElementById("kpi-sub").innerText =
    `\u5E02\u5834: ${stock.market ?? "-"} / \u696D\u7A2E: ${stock.industry ?? "-"} / \u9A30\u843D\u7387(1\u9031): ${formatPercent(r1w, 2)} / \u9A30\u843D\u7387(1\u304B\u6708): ${formatPercent(r1m, 2)} / \u9A30\u843D\u7387(3\u304B\u6708): ${formatPercent(r3m, 2)}`;
}

function availableOverlayDefs(stock) {
  return overlayDefs.filter(def => toNumber(def.getter(stock)) != null);
}

function renderOverlayOptions(stock) {
  const options = availableOverlayDefs(stock);
  const root = document.getElementById("overlay-options");
  root.innerHTML = options.map(def => {
    const checked = selectedOverlayKeys.includes(def.key) ? "checked" : "";
    return `
      <label class="overlay-option">
        <input type="checkbox" value="${def.key}" ${checked}>
        <span>${def.label}</span>
      </label>
    `;
  }).join("");

  const availSet = new Set(options.map(d => d.key));
  selectedOverlayKeys = selectedOverlayKeys.filter(key => availSet.has(key));
}

function updateOverlaySummary() {
  const selected = overlayDefs.filter(d => selectedOverlayKeys.includes(d.key));
  const summary = selected.length ? selected.map(d => d.label).join(" / ") : "\u306A\u3057";
  document.getElementById("overlay-summary").innerText = `\u91CD\u7573: ${summary}`;
}

function openOverlayWindow() {
  if (!currentStock) return;
  renderOverlayOptions(currentStock);
  document.getElementById("overlay-modal").classList.add("open");
}

function closeOverlayWindow() {
  document.getElementById("overlay-modal").classList.remove("open");
}

function handleOverlayBackdrop(event) {
  if (event.target.id === "overlay-modal") closeOverlayWindow();
}

function applyOverlaySelection() {
  const checked = Array.from(document.querySelectorAll("#overlay-options input[type='checkbox']:checked"));
  selectedOverlayKeys = checked.map(el => el.value);
  closeOverlayWindow();
  updateOverlaySummary();
  createPriceChart(currentStock, currentRows);
}

function buildOverlayDatasets(stock, labelsCount) {
  if (!stock || !labelsCount || labelsCount <= 0) return [];
  const datasets = [];

  for (const def of overlayDefs) {
    if (!selectedOverlayKeys.includes(def.key)) continue;
    const v = toNumber(def.getter(stock));
    if (v == null) continue;

    datasets.push({
      label: `${def.label} (${def.unit})`,
      data: Array.from({ length: labelsCount }, () => v),
      yAxisID: "yMetric",
      borderColor: def.color,
      borderWidth: 1.6,
      borderDash: [6, 5],
      pointRadius: 0,
      tension: 0
    });
  }

  return datasets;
}

function createPriceChart(stock, rows) {
  const ctx = document.getElementById("priceChart");
  if (priceChart) priceChart.destroy();

  let labels = [];
  let closeSeries = [];

  if (rows && rows.length > 0) {
    const recent = rows.slice(-180);
    labels = recent.map(r => r.date);
    closeSeries = recent.map(r => r.close);
  } else {
    const current = toNumber(stock?.price?.current);
    if (current != null) {
      labels = ["\u73FE\u5728"];
      closeSeries = [current];
    }
  }

  const sma5 = movingAverage(closeSeries, 5);
  const sma25 = movingAverage(closeSeries, 25);

  const baseDatasets = [
    {
      label: "\u7D42\u5024",
      data: closeSeries,
      yAxisID: "yPrice",
      borderColor: "#1f6feb",
      backgroundColor: "rgba(31,111,235,0.12)",
      borderWidth: 2,
      pointRadius: 0,
      tension: 0
    },
    {
      label: "SMA5",
      data: sma5,
      yAxisID: "yPrice",
      borderColor: "#f59e0b",
      borderWidth: 1.8,
      pointRadius: 0,
      tension: 0
    },
    {
      label: "SMA25",
      data: sma25,
      yAxisID: "yPrice",
      borderColor: "#10b981",
      borderWidth: 1.8,
      pointRadius: 0,
      tension: 0
    }
  ];

  const overlayDatasets = buildOverlayDatasets(stock, labels.length);

  priceChart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [...baseDatasets, ...overlayDatasets]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        title: {
          display: true,
          text: `${stock.name} (${stock.code}) \u7D42\u5024 + \u6307\u6A19\u91CD\u7573`
        }
      },
      scales: {
        yPrice: {
          type: "linear",
          position: "left",
          ticks: {
            callback: (v) => Number(v).toLocaleString("ja-JP")
          },
          title: {
            display: true,
            text: "\u682A\u4FA1(\u5186)"
          }
        },
        yMetric: {
          type: "linear",
          position: "right",
          grid: {
            drawOnChartArea: false
          },
          title: {
            display: true,
            text: "\u6307\u6A19"
          }
        }
      }
    }
  });
}

function buildFinancialHistory(stock) {
  const raw = Array.isArray(stock?.financial_history) ? stock.financial_history : [];
  const rows = raw
    .map(item => ({
      year: String(item?.year ?? ""),
      revenue_oku: toNumber(item?.revenue_oku),
      operating_income_oku: toNumber(item?.operating_income_oku),
      net_income_oku: toNumber(item?.net_income_oku),
      roe: toNumber(item?.roe),
      roa: toNumber(item?.roa),
      eps: toNumber(item?.eps),
      bps: toNumber(item?.bps)
    }))
    .filter(item => item.year && (
      item.revenue_oku != null ||
      item.operating_income_oku != null ||
      item.net_income_oku != null ||
      item.roe != null ||
      item.roa != null ||
      item.eps != null ||
      item.bps != null
    ))
    .sort((a, b) => Number(a.year) - Number(b.year));

  if (rows.length > 0) return rows;

  const year = String(new Date().getFullYear());
  return [{
    year,
    revenue_oku: toNumber(stock?.financial?.revenue_oku),
    operating_income_oku: toNumber(stock?.financial?.operating_income_oku),
    net_income_oku: toNumber(stock?.financial?.net_income_oku),
    roe: toNumber(stock?.profitability?.roe),
    roa: toNumber(stock?.profitability?.roa),
    eps: null,
    bps: null
  }];
}

function buildDividendHistory(stock) {
  const raw = Array.isArray(stock?.dividend_history) ? stock.dividend_history : [];
  const rows = raw
    .map(item => ({
      year: String(item?.year ?? ""),
      dividend_per_share: toNumber(item?.dividend_per_share),
      dividend_yield: toNumber(item?.dividend_yield)
    }))
    .filter(item => item.year && (item.dividend_per_share != null || item.dividend_yield != null))
    .sort((a, b) => Number(a.year) - Number(b.year));

  if (rows.length > 0) return rows;

  const year = String(new Date().getFullYear());
  return [{
    year,
    dividend_per_share: toNumber(stock?.dividend?.per_share),
    dividend_yield: toNumber(stock?.dividend?.yield)
  }];
}

function createFinanceChart(stock) {
  const ctx = document.getElementById("financeChart");
  if (financeChart) financeChart.destroy();

  const history = buildFinancialHistory(stock);

  financeChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: history.map(r => r.year),
      datasets: [
        {
          label: "\u58F2\u4E0A(\u5104\u5186)",
          data: history.map(r => r.revenue_oku),
          yAxisID: "yAmount",
          backgroundColor: "rgba(45,127,249,0.75)"
        },
        {
          type: "line",
          label: "ROE(%)",
          data: history.map(r => r.roe),
          yAxisID: "yPercent",
          borderColor: "#ef4444",
          backgroundColor: "#ef4444",
          borderWidth: 2,
          pointRadius: 3,
          tension: 0
        },
        {
          type: "line",
          label: "ROA(%)",
          data: history.map(r => r.roa),
          yAxisID: "yPercent",
          borderColor: "#f97316",
          backgroundColor: "#f97316",
          borderWidth: 2,
          pointRadius: 3,
          tension: 0
        },
        {
          type: "line",
          label: "EPS(\u5186)",
          data: history.map(r => r.eps),
          yAxisID: "yPerShare",
          borderColor: "#7c3aed",
          backgroundColor: "#7c3aed",
          borderWidth: 2,
          pointRadius: 3,
          tension: 0
        },
        {
          type: "line",
          label: "BPS(\u5186)",
          data: history.map(r => r.bps),
          yAxisID: "yPerShare",
          borderColor: "#0ea5e9",
          backgroundColor: "#0ea5e9",
          borderWidth: 2,
          pointRadius: 3,
          tension: 0
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      scales: {
        x: {
          title: {
            display: true,
            text: "\u5E74"
          }
        },
        yAmount: {
          title: {
            display: true,
            text: "\u91D1\u984D(\u5104\u5186)"
          },
          ticks: {
            callback: (v) => Number(v).toLocaleString("ja-JP")
          }
        },
        yPercent: {
          position: "right",
          grid: {
            drawOnChartArea: false
          },
          title: {
            display: true,
            text: "\u53CE\u76CA\u6027(%)"
          }
        },
        yPerShare: {
          position: "right",
          offset: true,
          grid: {
            drawOnChartArea: false
          },
          title: {
            display: true,
            text: "EPS / BPS(\u5186)"
          },
          ticks: {
            callback: (v) => Number(v).toLocaleString("ja-JP")
          }
        },
        yPercent: {
          position: "right",
          grid: {
            drawOnChartArea: false
          },
          title: {
            display: true,
            text: "\u53CE\u76CA\u6027(%)"
          }
        },
        yPerShare: {
          position: "right",
          offset: true,
          grid: {
            drawOnChartArea: false
          },
          title: {
            display: true,
            text: "EPS / BPS(\u5186)"
          },
          ticks: {

async function loadDetail() {
  try {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    const response = await fetch("data.json?v=" + Date.now());
    if (!response.ok) return;

    const data = await response.json();
    allStocks = data.stocks || [];
    if (allStocks.length === 0) return;

    currentStock = allStocks.find(s => s.code === code) || allStocks[0];
    currentIndex = allStocks.findIndex(s => s.code === currentStock.code);

    document.getElementById("stock-name").innerText = `${currentStock.name} (${currentStock.code})`;

    currentRows = await loadPriceHistory(currentStock.code);
    renderKpiGrid(currentStock, currentRows);
    renderOverlayOptions(currentStock);
    updateOverlaySummary();
    createPriceChart(currentStock, currentRows);
    createFinanceChart(currentStock);
    createProfitChart(currentStock);
    createDividendChart(currentStock);
  } catch (e) {
    console.error(e);
  }
}

function moveStock(direction) {
  const newIndex = currentIndex + direction;
  if (newIndex < 0 || newIndex >= allStocks.length) return;
  const nextCode = allStocks[newIndex].code;
  window.location.href = "detail.html?code=" + nextCode;
}

function goBack(event) {
  event.preventDefault();
  if (window.history.length > 1) {
    window.history.back();
    return;
  }
  window.location.href = "stocks.html";
}

loadDetail();
