<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>業界別動向（週一更新）</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 20px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 8px;
    }
    .subtitle {
      color: #555;
      margin-bottom: 20px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .toolbar select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #d7dde5;
    }
    .heatmap {
      background: white;
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.06);
      border: 1px solid #eef1f5;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7a8794;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 12px;
      text-decoration: none;
      color: #2d7ff9;
    }
    .note {
      color: #666;
      font-size: 13px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="index.html">← トップへ</a>
    <h1>業界別動向（週一更新）</h1>
    <div class="subtitle">33業種ヒートマップ（仮）</div>

    <div class="toolbar">
      <select>
        <option>週次</option>
        <option>月次</option>
        <option>半年</option>
      </select>
      <select>
        <option>プライム</option>
        <option>スタンダード</option>
        <option>グロース</option>
        <option>PRO Market</option>
        <option>全市場</option>
      </select>
    </div>

    <div class="heatmap">ヒートマップ表示エリア（仮）</div>
    <div class="note">クリックで銘柄詳細・時系列のダイアログを表示する想定です。</div>
  </div>
</body>
</html>
