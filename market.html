<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>マーケット概況</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --line: #e7ecf3;
      --text: #1f2937;
      --muted: #5b6472;
      --accent: #2d7ff9;
    }
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      margin: 20px;
      color: var(--text);
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    .page-hero {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      padding: 18px 20px;
      margin-bottom: 18px;
    }
    .page-nav {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    .subtitle {
      color: var(--muted);
      margin-bottom: 0;
      line-height: 1.6;
    }
    .page-eyebrow {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .hero-meta {
      margin-top: 10px;
      font-size: 13px;
      color: #6b7280;
    }
    .section-head {
      margin: 0 0 8px 0;
      font-size: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .card {
      background: var(--surface);
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      border: 1px solid var(--line);
    }
    .card h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 16px;
    }
    .kpi-stack {
      display: grid;
      gap: 12px;
    }
    .kpi {
      background: var(--surface-soft);
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #edf0f4;
    }
    .kpi .label {
      color: #666;
      font-size: 12px;
    }
    .kpi .value {
      font-size: 16px;
      margin-top: 4px;
    }
    .chart-wrap {
      height: 260px;
    }
    .chart-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: var(--accent);
      font-weight: 600;
    }

    .chart-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .range-group {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .range-label {
      font-size: 12px;
      color: var(--muted);
    }
    .range-btn {
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid #cfd6e4;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
    }
    .range-btn.active {
      background: #2d7ff9;
      color: #fff;
      border-color: #2d7ff9;
    }
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .chart-panel {
      background: #f9fbfe;
      border: 1px solid #eef1f5;
      border-radius: 12px;
      padding: 12px;
    }
    .chart-panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .chart-title {
      font-size: 13px;
      font-weight: bold;
      color: #333;
    }
    .btn {
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid #cfd6e4;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal-content {
      background: #fff;
      width: 560px;
      max-width: 92vw;
      border-radius: 14px;
      padding: 18px;
      border: 1px solid #e6e9ef;
    }
    .modal-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .indicator-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
      max-height: 320px;
      overflow: auto;
      padding: 6px 0;
      border-top: 1px solid #f0f2f6;
      border-bottom: 1px solid #f0f2f6;
      margin-bottom: 10px;
    }
    .indicator-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    .summary-box {
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    @media (max-width: 900px) {
      body { margin: 14px; }
      .page-hero, .card { padding: 16px; }
      .grid { grid-template-columns: 1fr; }
      .kpi-row { grid-template-columns: 1fr; }
      .chart-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-hero">
      <div class="page-nav">
        <a class="back-link" href="index.html">← トップへ</a>
      </div>
      <div class="page-eyebrow">MARKET OVERVIEW</div>
      <h1>マーケット概況</h1>
      <div class="subtitle">株価指数、先物、為替などの動きを一覧とチャートで確認できます。</div>
      <div class="hero-meta" id="market-updated">更新日時: -- / 更新頻度: 毎日</div>
    </div>

    <div class="grid">
      <h2 class="section-head">主要指標</h2>
      <div class="card">
        <div class="kpi-grid">
          <div class="kpi-section">
            <h3>株価指数</h3>
            <div class="kpi-row">
              <div class="kpi"><div class="label">日経225</div><div class="value" id="kpi-nikkei">--</div></div>
              <div class="kpi"><div class="label">TOPIX</div><div class="value" id="kpi-topix">--</div></div>
              <div class="kpi"><div class="label">NYダウ</div><div class="value" id="kpi-dow">--</div></div>
              <div class="kpi"><div class="label">NASDAQ</div><div class="value" id="kpi-nasdaq">--</div></div>
              <div class="kpi"><div class="label">S&P500</div><div class="value" id="kpi-sp500">--</div></div>
              <div class="kpi"><div class="label">VIX</div><div class="value" id="kpi-vix">--</div></div>
            </div>
          </div>

          <div class="kpi-stack">
            <div class="kpi-section">
              <h3>商品先物</h3>
              <div class="kpi-row">
                <div class="kpi"><div class="label">WTI原油</div><div class="value" id="kpi-wti">--</div></div>
                <div class="kpi"><div class="label">金</div><div class="value" id="kpi-gold">--</div></div>
                <div class="kpi"><div class="label">銀</div><div class="value" id="kpi-silver">--</div></div>
              </div>
            </div>

            <div class="kpi-section">
              <h3>外国為替</h3>
              <div class="kpi-row">
                <div class="kpi"><div class="label">米ドル/円</div><div class="value" id="kpi-usdjpy">--</div></div>
                <div class="kpi"><div class="label">ユーロ/円</div><div class="value" id="kpi-eurjpy">--</div></div>
                <div class="kpi"><div class="label">ユーロ/米ドル</div><div class="value" id="kpi-eurusd">--</div></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="chart-controls">
          <div class="range-group">
            <span class="range-label">期間:</span>
            <button class="range-btn" data-range="7">1週間</button>
            <button class="range-btn active" data-range="30">1か月</button>
            <button class="range-btn" data-range="90">3か月</button>
            <button class="range-btn" data-range="183">半年</button>
          </div>
        </div>

        <div class="chart-grid">
          <div class="chart-panel">
            <div class="chart-panel-head">
              <div class="chart-title">指標チャート</div>
              <button class="btn" id="btnSelectLeft">表示指標</button>
            </div>
            <div class="chart-wrap">
              <canvas id="chartRaw" class="chart-canvas"></canvas>
            </div>
          </div>

          <div class="chart-panel">
            <div class="chart-panel-head">
              <div class="chart-title">変化率チャート（開始時=0%）</div>
              <button class="btn" id="btnSelectRight">表示指標</button>
            </div>
            <div class="chart-wrap">
              <canvas id="chartPct" class="chart-canvas"></canvas>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="modal" id="indicatorModal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">表示指標</div>
      <div class="indicator-list" id="indicatorList"></div>
      <div class="modal-actions">
        <button class="btn" id="modalCancel">閉じる</button>
        <button class="btn" id="modalApply">表示する</button>
      </div>
    </div>
  </div>

  <script>
    const INDICATORS = [
      { id: "NIKKEI225", label: "日経225" },
      { id: "TOPIX", label: "TOPIX" },
      { id: "DJIA", label: "NYダウ" },
      { id: "NASDAQCOM", label: "NASDAQ" },
      { id: "SP500", label: "S&P500" },
      { id: "VIXCLS", label: "VIX" },
      { id: "WTI", label: "WTI原油" },
      { id: "GOLD", label: "金" },
      { id: "SILVER", label: "銀" },
      { id: "USDJPY", label: "米ドル/円" },
      { id: "EURJPY", label: "ユーロ/円" },
      { id: "EURUSD", label: "ユーロ/米ドル" }
    ];

    const leftPalette = ["#1f77b4", "#d62728"];

    let marketChartRaw = null;
    let marketChartPct = null;
    let rangeDays = 30;
    let seriesMap = {};
    let selectedLeft = ["NIKKEI225"];
    let selectedRight = ["NIKKEI225", "TOPIX"];
    let modalMode = "left";

    function filterByRange(data) {
      if (!data || data.length === 0) return [];
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - rangeDays + 1);
      return data.filter(p => {
        const d = new Date(p.date + "T00:00:00");
        return d >= cutoff;
      });
    }

    function buildLabels(baseSeries) {
      return baseSeries.map(p => p.date);
    }

    function mapSeriesValues(series, labels) {
      const map = new Map(series.map(p => [p.date, p.value]));
      return labels.map(d => map.has(d) ? map.get(d) : null);
    }

    function makeRawDatasets(ids, labels) {
      return ids.map((id, idx) => {
        const s = seriesMap[id];
        const data = mapSeriesValues(filterByRange(s.data || []), labels);
        return {
          label: s.label || id,
          data,
          borderColor: leftPalette[idx % leftPalette.length],
          backgroundColor: leftPalette[idx % leftPalette.length],
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.15,
          yAxisID: idx === 0 ? "y" : "y1"
        };
      });
    }

    function makePctDatasets(ids, labels) {
      return ids.map(id => {
        const s = seriesMap[id];
        const values = mapSeriesValues(filterByRange(s.data || []), labels);
        const base = values.find(v => v != null && v !== 0);
        const pct = values.map(v => {
          if (v == null || base == null || base === 0) return null;
          return (v / base - 1) * 100;
        });
        return {
          label: s.label || id,
          data: pct,
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.15
        };
      });
    }

    function buildCharts() {
      const leftIds = selectedLeft.filter(id => seriesMap[id]);
      if (leftIds.length === 0) return;
      const baseLeft = filterByRange(seriesMap[leftIds[0]].data || []);
      const labels = buildLabels(baseLeft);

      const rawDatasets = makeRawDatasets(leftIds, labels);
      const pctIds = selectedRight.filter(id => seriesMap[id]);
      const pctDatasets = makePctDatasets(pctIds, labels);

      if (marketChartRaw) marketChartRaw.destroy();
      if (marketChartPct) marketChartPct.destroy();

      const ctxRaw = document.getElementById("chartRaw");
      const ctxPct = document.getElementById("chartPct");
      const showRightAxis = leftIds.length > 1;

      marketChartRaw = new Chart(ctxRaw, {
        type: "line",
        data: { labels, datasets: rawDatasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: "bottom" } },
          scales: {
            x: { ticks: { maxTicksLimit: 6 } },
            y: { ticks: { maxTicksLimit: 5 } },
            y1: {
              display: showRightAxis,
              position: "right",
              ticks: { maxTicksLimit: 5 },
              grid: { drawOnChartArea: false }
            }
          }
        }
      });

      marketChartPct = new Chart(ctxPct, {
        type: "line",
        data: { labels, datasets: pctDatasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: "bottom" } },
          scales: {
            x: { ticks: { maxTicksLimit: 6 } },
            y: {
              ticks: { maxTicksLimit: 5, callback: v => v + "%" }
            }
          }
        }
      });
    }

    function openModal(mode) {
      modalMode = mode;
      const modal = document.getElementById("indicatorModal");
      const list = document.getElementById("indicatorList");
      const title = document.getElementById("modalTitle");
      list.innerHTML = "";
      const isLeft = mode === "left";
      title.innerText = isLeft ? "表示指標（左: 最大2つ）" : "表示指標（右: 複数選択可）";

      INDICATORS.forEach(item => {
        const label = document.createElement("label");
        label.className = "indicator-item";
        const input = document.createElement("input");
        input.type = "checkbox";
        input.name = isLeft ? "indicatorLeft" : "indicatorRight";
        input.value = item.id;
        if (isLeft && selectedLeft.includes(item.id)) input.checked = true;
        if (!isLeft && selectedRight.includes(item.id)) input.checked = true;
        label.appendChild(input);
        const span = document.createElement("span");
        span.innerText = item.label;
        label.appendChild(span);
        list.appendChild(label);
      });

      modal.style.display = "flex";
    }

    function closeModal() {
      const modal = document.getElementById("indicatorModal");
      modal.style.display = "none";
    }

    function applyModal() {
      if (modalMode === "left") {
        const checked = Array.from(document.querySelectorAll("input[name='indicatorLeft']:checked"))
          .map(i => i.value);
        if (checked.length === 0) {
          alert("左チャートは1つ以上選択してください");
          return;
        }
        if (checked.length > 2) {
          alert("左チャートは2つまで選択できます");
          return;
        }
        selectedLeft = checked;
      } else {
        const checked = Array.from(document.querySelectorAll("input[name='indicatorRight']:checked"))
          .map(i => i.value);
        if (checked.length > 0) {
          selectedRight = checked;
        }
      }
      closeModal();
      buildCharts();
    }

    function bindRangeButtons() {
      const buttons = document.querySelectorAll(".range-btn");
      buttons.forEach(btn => {
        btn.addEventListener("click", () => {
          buttons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          rangeDays = Number(btn.dataset.range);
          buildCharts();
        });
      });
    }

    async function loadMarket() {
      const res = await fetch("market_data/market.json?v=" + new Date().getTime());
      const data = await res.json();
      const updated = document.getElementById("market-updated");
      if (updated) {
        updated.innerText = "更新日時: " + (data.updated_at || "--");
      }

      seriesMap = {};
      (data.series || []).forEach(s => {
        seriesMap[s.id] = s;
      });

      function setValue(id, value) {
        const el = document.getElementById(id);
        if (el) {
          el.innerText = value;
        }
      }

      setValue("kpi-nikkei", seriesMap["NIKKEI225"]?.summary?.latest ?? "--");
      setValue("kpi-topix", seriesMap["TOPIX"]?.summary?.latest ?? "--");
      setValue("kpi-dow", seriesMap["DJIA"]?.summary?.latest ?? "--");
      setValue("kpi-nasdaq", seriesMap["NASDAQCOM"]?.summary?.latest ?? "--");
      setValue("kpi-sp500", seriesMap["SP500"]?.summary?.latest ?? "--");
      setValue("kpi-vix", seriesMap["VIXCLS"]?.summary?.latest ?? "--");
      setValue("kpi-wti", seriesMap["WTI"]?.summary?.latest ?? "--");
      setValue("kpi-gold", seriesMap["GOLD"]?.summary?.latest ?? "--");
      setValue("kpi-silver", seriesMap["SILVER"]?.summary?.latest ?? "--");
      setValue("kpi-usdjpy", seriesMap["USDJPY"]?.summary?.latest ?? "--");
      setValue("kpi-eurjpy", seriesMap["EURJPY"]?.summary?.latest ?? "--");
      setValue("kpi-eurusd", seriesMap["EURUSD"]?.summary?.latest ?? "--");

      buildCharts();
    }

    bindRangeButtons();
    document.getElementById("btnSelectLeft").addEventListener("click", () => openModal("left"));
    document.getElementById("btnSelectRight").addEventListener("click", () => openModal("right"));
    document.getElementById("modalCancel").addEventListener("click", closeModal);
    document.getElementById("modalApply").addEventListener("click", applyModal);
    document.getElementById("indicatorModal").addEventListener("click", (e) => {
      if (e.target.id === "indicatorModal") closeModal();
    });

    loadMarket();
  </script>
</body>
</html>
